# 🔁 Redirect HTTP → HTTPS
server {
    listen 80;
    server_name finzo.duckdns.org;

    return 301 https://$host$request_uri;
}

# 🔒 HTTPS SERVER
server {
    listen 443 ssl;
    server_name finzo.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/finzo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finzo.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # 🔥 SPA FIX
    location / {
        try_files $uri /index.html;
    }

    # Static assets (vite)
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # security
    add_header X-Content-Type-Options nosniff;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}